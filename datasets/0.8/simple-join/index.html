<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Croissant Visualizer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <!-- Prism.js for JSON syntax highlighting -->
    <link href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-json.min.js"></script>
    <!-- Marked.js for markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
    <!-- D3.js for SVG graph -->
    <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
    <link rel="stylesheet" href="../../static/visualizer.min.css">
</head>
<body>
    <div id="app"><p style="padding:2rem;font-family:sans-serif;color:#6b7280">Loading dataset…</p></div>
    <script>window.__GALLERY_URL__="../../index.html";</script>
    <script>window.__CROISSANT_DATA__ = {
  "@context": {
    "@language": "en",
    "@vocab": "https://schema.org/",
    "column": "ml:column",
    "data": {
      "@id": "ml:data",
      "@type": "@json"
    },
    "dataBiases": "ml:dataBiases",
    "dataCollection": "ml:dataCollection",
    "dataType": {
      "@id": "ml:dataType",
      "@type": "@vocab"
    },
    "dct": "http://purl.org/dc/terms/",
    "extract": "ml:extract",
    "field": "ml:field",
    "fileProperty": "ml:fileProperty",
    "format": "ml:format",
    "includes": "ml:includes",
    "isEnumeration": "ml:isEnumeration",
    "jsonPath": "ml:jsonPath",
    "ml": "http://mlcommons.org/schema/",
    "parentField": "ml:parentField",
    "path": "ml:path",
    "personalSensitiveInformation": "ml:personalSensitiveInformation",
    "recordSet": "ml:recordSet",
    "references": "ml:references",
    "regex": "ml:regex",
    "repeated": "ml:repeated",
    "replace": "ml:replace",
    "sc": "https://schema.org/",
    "separator": "ml:separator",
    "source": "ml:source",
    "subField": "ml:subField",
    "transform": "ml:transform"
  },
  "@type": "sc:Dataset",
  "name": "simple-join",
  "description": "Example to showcase the use of join.",
  "license": "https://creativecommons.org/licenses/by/4.0/",
  "url": "https://mlcommons.org",
  "distribution": [
    {
      "@type": "sc:FileObject",
      "name": "publications",
      "contentUrl": "data/publications.csv",
      "encodingFormat": "text/csv",
      "sha256": "d1bd4b903d5de29e6d455f28a68aff7095d3393a19a7cdfdeea3b9ad799e1ce1",
      "cr:examples": {
        "text_preview": "title,by\nA New Approach to Machine Learning Using Neural Networks,john.smith@gmail.com\nThe Application of Machine Learning to Natural Language Processing,jane.doe@yahoo.com\nThe Use of Machine Learning to Predict the Stock Market,david.lee@outlook.com\n"
      }
    }
  ],
  "recordSet": [
    {
      "@type": "ml:RecordSet",
      "name": "users",
      "description": "List of users.",
      "field": [
        {
          "@type": "ml:Field",
          "name": "email",
          "description": "Email of the author.",
          "dataType": "sc:Text"
        },
        {
          "@type": "ml:Field",
          "name": "fullname",
          "description": "Full name of the author.",
          "dataType": "sc:Text"
        }
      ],
      "data": [
        {
          "email": "john.smith@gmail.com",
          "fullname": "John Smith"
        },
        {
          "email": "jane.doe@yahoo.com",
          "fullname": "Jane Doe"
        },
        {
          "email": "david.lee@outlook.com",
          "fullname": "David Lee"
        },
        {
          "email": "mary.jones@hotmail.com",
          "fullname": "Mary Jones"
        }
      ],
      "cr:examples": {
        "columns": [
          "email",
          "fullname"
        ],
        "rows": [
          [
            "john.smith@gmail.com",
            "John Smith"
          ],
          [
            "jane.doe@yahoo.com",
            "Jane Doe"
          ],
          [
            "david.lee@outlook.com",
            "David Lee"
          ],
          [
            "mary.jones@hotmail.com",
            "Mary Jones"
          ]
        ]
      }
    },
    {
      "@type": "ml:RecordSet",
      "name": "publications_by_user",
      "description": "List of publications by user.",
      "field": [
        {
          "@type": "ml:Field",
          "name": "title",
          "description": "Full title of the publication.",
          "dataType": "sc:Text",
          "source": {
            "distribution": "publications",
            "extract": {
              "column": "title"
            }
          }
        },
        {
          "@type": "ml:Field",
          "name": "author_email",
          "description": "Email of the author.",
          "dataType": "sc:Text",
          "references": {
            "field": "users/email"
          },
          "source": {
            "distribution": "publications",
            "extract": {
              "column": "by"
            }
          }
        },
        {
          "@type": "ml:Field",
          "name": "author_fullname",
          "description": "Full name of the author.",
          "dataType": "sc:Text",
          "source": {
            "field": "users/fullname"
          }
        }
      ],
      "cr:examples": {
        "columns": [
          "title",
          "author_email",
          "author_fullname"
        ],
        "rows": [
          [
            "A New Approach to Machine Learning Using Neural Networks",
            "john.smith@gmail.com",
            "John Smith"
          ],
          [
            "The Application of Machine Learning to Natural Language Processing",
            "jane.doe@yahoo.com",
            "Jane Doe"
          ],
          [
            "The Use of Machine Learning to Predict the Stock Market",
            "david.lee@outlook.com",
            "David Lee"
          ]
        ]
      }
    }
  ]
};</script>
    <script src="../../static/visualizer.min.js"></script>
</body>
</html>
