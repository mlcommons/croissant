<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Croissant Visualizer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <!-- Prism.js for JSON syntax highlighting -->
    <link href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-json.min.js"></script>
    <!-- Marked.js for markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
    <!-- D3.js for SVG graph -->
    <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
    <link rel="stylesheet" href="../../static/visualizer.min.css">
</head>
<body>
    <div id="app"><p style="padding:2rem;font-family:sans-serif;color:#6b7280">Loading dataset…</p></div>
    <script>window.__GALLERY_URL__="../../index.html";</script>
    <script>window.__CROISSANT_DATA__ = {
  "@context": {
    "@language": "en",
    "@vocab": "https://schema.org/",
    "column": "ml:column",
    "data": {
      "@id": "ml:data",
      "@type": "@json"
    },
    "dataBiases": "ml:dataBiases",
    "dataCollection": "ml:dataCollection",
    "dataType": {
      "@id": "ml:dataType",
      "@type": "@vocab"
    },
    "dct": "http://purl.org/dc/terms/",
    "extract": "ml:extract",
    "field": "ml:field",
    "fileProperty": "ml:fileProperty",
    "format": "ml:format",
    "includes": "ml:includes",
    "isEnumeration": "ml:isEnumeration",
    "jsonPath": "ml:jsonPath",
    "ml": "http://mlcommons.org/schema/",
    "parentField": "ml:parentField",
    "path": "ml:path",
    "personalSensitiveInformation": "ml:personalSensitiveInformation",
    "recordSet": "ml:recordSet",
    "references": "ml:references",
    "regex": "ml:regex",
    "repeated": "ml:repeated",
    "replace": "ml:replace",
    "sc": "https://schema.org/",
    "separator": "ml:separator",
    "source": "ml:source",
    "subField": "ml:subField",
    "transform": "ml:transform"
  },
  "@type": "sc:Dataset",
  "name": "compressed_archive_example",
  "description": "This is a fairly minimal example, showing a way to describe archive files.",
  "url": "https://example.com/datasets/recipes/compressed_archive/about",
  "distribution": [
    {
      "@type": "sc:FileObject",
      "name": "compressed_archive.zip",
      "contentUrl": "data/compressed_archive.zip",
      "encodingFormat": "application/zip",
      "sha256": "4cee7cd36f1d874072b6a96c95ce53c9b01d158f0737e754e6c9cc80aeb06e5a",
      "cr:examples": {
        "file_list": [
          "croissant.jpeg",
          "large_croissant.jpeg",
          "pretzelsant.jpeg",
          "sort_of_croissant.jpeg"
        ],
        "file_count": 4
      }
    },
    {
      "@type": "sc:FileSet",
      "name": "image-files",
      "containedIn": "compressed_archive.zip",
      "encodingFormat": "image/jpeg",
      "includes": "*.jpeg",
      "cr:examples": {
        "file_list": [
          "croissant.jpeg",
          "large_croissant.jpeg",
          "pretzelsant.jpeg",
          "sort_of_croissant.jpeg"
        ],
        "file_count": 4,
        "includes": [
          "*.jpeg"
        ]
      }
    }
  ],
  "recordSet": [
    {
      "@type": "ml:RecordSet",
      "name": "images",
      "description": "Records extracted from the image files, with their schema.",
      "field": [
        {
          "@type": "ml:Field",
          "name": "image_content",
          "description": "The content of the image.",
          "dataType": "sc:ImageObject",
          "source": {
            "distribution": "image-files",
            "extract": {
              "fileProperty": "content"
            }
          }
        }
      ]
    }
  ]
};</script>
    <script src="../../static/visualizer.min.js"></script>
</body>
</html>
