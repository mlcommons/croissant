<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Croissant Visualizer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <!-- Prism.js for JSON syntax highlighting -->
    <link href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-json.min.js"></script>
    <!-- Marked.js for markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
    <!-- D3.js for SVG graph -->
    <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
    <link rel="stylesheet" href="../../static/visualizer.min.css">
</head>
<body>
    <div id="app"><p style="padding:2rem;font-family:sans-serif;color:#6b7280">Loading dataset…</p></div>
    <script>window.__GALLERY_URL__="../../index.html";</script>
    <script>window.__CROISSANT_DATA__ = {
  "@context": {
    "@language": "en",
    "@vocab": "https://schema.org/",
    "column": "ml:column",
    "data": {
      "@id": "ml:data",
      "@type": "@json"
    },
    "dataBiases": "ml:dataBiases",
    "dataCollection": "ml:dataCollection",
    "dataType": {
      "@id": "ml:dataType",
      "@type": "@vocab"
    },
    "dct": "http://purl.org/dc/terms/",
    "extract": "ml:extract",
    "field": "ml:field",
    "fileProperty": "ml:fileProperty",
    "format": "ml:format",
    "includes": "ml:includes",
    "isEnumeration": "ml:isEnumeration",
    "jsonPath": "ml:jsonPath",
    "ml": "http://mlcommons.org/schema/",
    "parentField": "ml:parentField",
    "path": "ml:path",
    "personalSensitiveInformation": "ml:personalSensitiveInformation",
    "recordSet": "ml:recordSet",
    "references": "ml:references",
    "regex": "ml:regex",
    "repeated": "ml:repeated",
    "replace": "ml:replace",
    "sc": "https://schema.org/",
    "separator": "ml:separator",
    "source": "ml:source",
    "subField": "ml:subField",
    "transform": "ml:transform"
  },
  "@type": "sc:Dataset",
  "name": "file_object_in_zip",
  "description": "Minimal example to read a FileObject contained in a zip.",
  "url": "https://mlcommons.org",
  "distribution": [
    {
      "@type": "sc:FileObject",
      "name": "zip_with_csv",
      "contentUrl": "data/zip_with_csv.zip",
      "encodingFormat": "application/zip",
      "sha256": "85c13a7e6940a8376f2448ed6078d4fa407ae33c7839e6d041a0e34413366792",
      "cr:examples": {
        "file_list": [
          "csv_in_zip.csv",
          "csv1_in_zip.csv",
          "csv2_in_zip.csv"
        ],
        "file_count": 3
      }
    },
    {
      "@type": "sc:FileObject",
      "name": "csv2_in_zip",
      "contentUrl": "csv2_in_zip.csv",
      "containedIn": "zip_with_csv",
      "encodingFormat": "text/csv",
      "cr:examples": {
        "text_preview": "property2\nfoo2\nbar2\n"
      }
    },
    {
      "@type": "sc:FileObject",
      "name": "csv1_in_zip",
      "contentUrl": "csv1_in_zip.csv",
      "containedIn": "zip_with_csv",
      "encodingFormat": "text/csv",
      "cr:examples": {
        "text_preview": "property1\nfoo1\nbar1\n"
      }
    }
  ],
  "recordSet": [
    {
      "@type": "ml:RecordSet",
      "name": "csv1",
      "description": "Records extracted from the CSV in the ZIP.",
      "field": [
        {
          "@type": "ml:Field",
          "name": "property1",
          "dataType": "sc:Text",
          "source": {
            "distribution": "csv1_in_zip",
            "extract": {
              "column": "property1"
            }
          }
        }
      ],
      "cr:examples": {
        "columns": [
          "property1"
        ],
        "rows": [
          [
            "foo1"
          ],
          [
            "bar1"
          ]
        ]
      }
    },
    {
      "@type": "ml:RecordSet",
      "name": "csv2",
      "description": "Records extracted from the CSV in the ZIP.",
      "field": [
        {
          "@type": "ml:Field",
          "name": "property2",
          "dataType": "sc:Text",
          "source": {
            "distribution": "csv2_in_zip",
            "extract": {
              "column": "property2"
            }
          }
        }
      ],
      "cr:examples": {
        "columns": [
          "property2"
        ],
        "rows": [
          [
            "foo2"
          ],
          [
            "bar2"
          ]
        ]
      }
    }
  ]
};</script>
    <script src="../../static/visualizer.min.js"></script>
</body>
</html>
