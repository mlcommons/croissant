<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Croissant Visualizer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <!-- Prism.js for JSON syntax highlighting -->
    <link href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-json.min.js"></script>
    <!-- Marked.js for markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
    <!-- D3.js for SVG graph -->
    <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
    <link rel="stylesheet" href="../../static/visualizer.min.css">
</head>
<body>
    <div id="app"><p style="padding:2rem;font-family:sans-serif;color:#6b7280">Loading dataset…</p></div>
    <script>window.__GALLERY_URL__="../../index.html";</script>
    <script>window.__CROISSANT_DATA__ = {
  "@context": {
    "@language": "en",
    "@vocab": "https://schema.org/",
    "column": "ml:column",
    "data": {
      "@id": "ml:data",
      "@type": "@json"
    },
    "dataBiases": "ml:dataBiases",
    "dataCollection": "ml:dataCollection",
    "dataType": {
      "@id": "ml:dataType",
      "@type": "@vocab"
    },
    "dct": "http://purl.org/dc/terms/",
    "extract": "ml:extract",
    "field": "ml:field",
    "fileProperty": "ml:fileProperty",
    "format": "ml:format",
    "includes": "ml:includes",
    "isEnumeration": "ml:isEnumeration",
    "jsonPath": "ml:jsonPath",
    "ml": "http://mlcommons.org/schema/",
    "parentField": "ml:parentField",
    "path": "ml:path",
    "personalSensitiveInformation": "ml:personalSensitiveInformation",
    "recordSet": "ml:recordSet",
    "references": "ml:references",
    "regex": "ml:regex",
    "repeated": "ml:repeated",
    "replace": "ml:replace",
    "sc": "https://schema.org/",
    "separator": "ml:separator",
    "source": "ml:source",
    "subField": "ml:subField",
    "transform": "ml:transform",
    "wd": "https://www.wikidata.org/wiki/"
  },
  "@type": "sc:Dataset",
  "name": "simple-split",
  "description": "An artificial example dataset defining splits from a CSV column",
  "license": "https://creativecommons.org/licenses/by/4.0/",
  "url": "https://mlcommons.org",
  "distribution": [
    {
      "@type": "sc:FileObject",
      "name": "books.csv",
      "contentUrl": "data/books.csv",
      "encodingFormat": "text/csv",
      "sha256": "d35c5a01eecbd7700faf86b4ec838eb65bd6e861633b1e10ca3294d4e58e75c9",
      "cr:examples": {
        "text_preview": "Title,Author,Split\nThe Great Gatsby,F. Scott Fitzgerald,train\nTo Kill a Mockingbird,Harper Lee,train\n1984,George Orwell,train\nThe Lord of the Rings,J.R.R. Tolkien,train\n"
      }
    }
  ],
  "recordSet": [
    {
      "@type": "ml:RecordSet",
      "name": "books",
      "field": [
        {
          "@type": "ml:Field",
          "name": "title",
          "description": "The title of the book",
          "dataType": "sc:Text",
          "source": {
            "distribution": "books.csv",
            "extract": {
              "column": "Title"
            }
          }
        },
        {
          "@type": "ml:Field",
          "name": "Author",
          "description": "The author of the book",
          "dataType": "sc:Text",
          "source": {
            "distribution": "books.csv",
            "extract": {
              "column": "Author"
            }
          }
        },
        {
          "@type": "ml:Field",
          "name": "split",
          "description": "The data split to which belongs the record",
          "dataType": [
            "sc:Text",
            "wd:Q3985153"
          ],
          "source": {
            "distribution": "books.csv",
            "extract": {
              "column": "Split"
            }
          }
        }
      ],
      "cr:examples": {
        "columns": [
          "title",
          "Author",
          "split"
        ],
        "rows": [
          [
            "The Great Gatsby",
            "F. Scott Fitzgerald",
            "train"
          ],
          [
            "To Kill a Mockingbird",
            "Harper Lee",
            "train"
          ],
          [
            "1984",
            "George Orwell",
            "train"
          ],
          [
            "The Lord of the Rings",
            "J.R.R. Tolkien",
            "train"
          ],
          [
            "The Hitchhiker's Guide to the Galaxy",
            "Douglas Adams",
            "train"
          ]
        ]
      }
    }
  ]
};</script>
    <script src="../../static/visualizer.min.js"></script>
</body>
</html>
