<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Croissant Visualizer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <!-- Prism.js for JSON syntax highlighting -->
    <link href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-json.min.js"></script>
    <!-- Marked.js for markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
    <!-- D3.js for SVG graph -->
    <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
    <link rel="stylesheet" href="../../static/visualizer.min.css">
</head>
<body>
    <div id="app"><p style="padding:2rem;font-family:sans-serif;color:#6b7280">Loading dataset…</p></div>
    <script>window.__GALLERY_URL__="../../index.html";</script>
    <script>window.__CROISSANT_DATA__ = {
  "@context": {
    "@language": "en",
    "@vocab": "https://schema.org/",
    "column": "ml:column",
    "data": {
      "@id": "ml:data",
      "@type": "@json"
    },
    "dataBiases": "ml:dataBiases",
    "dataCollection": "ml:dataCollection",
    "dataType": {
      "@id": "ml:dataType",
      "@type": "@vocab"
    },
    "dct": "http://purl.org/dc/terms/",
    "extract": "ml:extract",
    "field": "ml:field",
    "fileProperty": "ml:fileProperty",
    "format": "ml:format",
    "includes": "ml:includes",
    "isEnumeration": "ml:isEnumeration",
    "jsonPath": "ml:jsonPath",
    "ml": "http://mlcommons.org/schema/",
    "parentField": "ml:parentField",
    "path": "ml:path",
    "personalSensitiveInformation": "ml:personalSensitiveInformation",
    "recordSet": "ml:recordSet",
    "references": "ml:references",
    "regex": "ml:regex",
    "repeated": "ml:repeated",
    "replace": "ml:replace",
    "sc": "https://schema.org/",
    "separator": "ml:separator",
    "source": "ml:source",
    "subField": "ml:subField",
    "transform": "ml:transform"
  },
  "@type": "sc:Dataset",
  "name": "enum_example",
  "description": "This is a fairly minimal example, showing a way to describe enumerations.",
  "url": "https://example.com/datasets/enum/about",
  "distribution": [
    {
      "@type": "sc:FileObject",
      "name": "enum.csv",
      "contentUrl": "data/enum.csv",
      "encodingFormat": "text/csv",
      "sha256": "52121a5df209dc2d63069710923e25f769d380a1388d00798e84d432c54fd934",
      "cr:examples": {
        "text_preview": "name,direction\nThe Wall,0\nKings Landing,1\nDorne,2\nPyke,3\n"
      }
    },
    {
      "@type": "sc:FileObject",
      "name": "enum_directions.csv",
      "contentUrl": "data/enum_directions.csv",
      "encodingFormat": "text/csv",
      "sha256": "b993e19ae54b3f4f0264ada1eca3b9d84b62c2c52d71b8049876e9cc952d5685",
      "cr:examples": {
        "text_preview": "key,label\n0,North\n1,East\n2,South\n3,West\n"
      }
    }
  ],
  "recordSet": [
    {
      "@type": "ml:RecordSet",
      "name": "direction_enum",
      "description": "Maps compass direction keys (0, 1, 2, 3) to labeled values.",
      "key": "key",
      "field": [
        {
          "@type": "ml:Field",
          "name": "key",
          "description": "0, 1, 2 or 3",
          "dataType": "sc:Integer",
          "source": {
            "distribution": "enum_directions.csv",
            "extract": {
              "column": "key"
            }
          }
        },
        {
          "@type": "ml:Field",
          "name": "label",
          "description": "North, East, South or West",
          "dataType": [
            "sc:Text",
            "sc:name"
          ],
          "source": {
            "distribution": "enum_directions.csv",
            "extract": {
              "column": "label"
            }
          }
        }
      ],
      "cr:examples": {
        "columns": [
          "key",
          "label"
        ],
        "rows": [
          [
            "0",
            "North"
          ],
          [
            "1",
            "East"
          ],
          [
            "2",
            "South"
          ],
          [
            "3",
            "West"
          ]
        ]
      }
    },
    {
      "@type": "ml:RecordSet",
      "name": "examples",
      "description": "Records extracted from the examples table, with their schema.",
      "field": [
        {
          "@type": "ml:Field",
          "name": "name",
          "description": "The first column contains the name of the object.",
          "dataType": "sc:Text",
          "references": {
            "distribution": "enum.csv",
            "extract": {
              "column": "name"
            }
          }
        },
        {
          "@type": "ml:Field",
          "name": "direction",
          "description": "Direction of the object (0: North, 1: East, 2: South, 3: West)",
          "dataType": [
            "sc:Text",
            "ml:Enum"
          ],
          "references": {
            "field": "direction_enum/key"
          },
          "source": {
            "distribution": "enum.csv",
            "extract": {
              "column": "direction"
            }
          }
        }
      ],
      "cr:examples": {
        "columns": [
          "name",
          "age"
        ],
        "rows": [
          [
            "None",
            "None"
          ],
          [
            "None",
            "None"
          ],
          [
            "None",
            "None"
          ],
          [
            "None",
            "None"
          ]
        ]
      }
    }
  ]
};</script>
    <script src="../../static/visualizer.min.js"></script>
</body>
</html>
