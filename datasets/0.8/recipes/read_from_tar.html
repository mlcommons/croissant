<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Croissant Visualizer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <!-- Prism.js for JSON syntax highlighting -->
    <link href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-json.min.js"></script>
    <!-- Marked.js for markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
    <!-- D3.js for SVG graph -->
    <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
    <link rel="stylesheet" href="../../static/visualizer.min.css">
</head>
<body>
    <div id="app"><p style="padding:2rem;font-family:sans-serif;color:#6b7280">Loading dataset…</p></div>
    <script>window.__GALLERY_URL__="../../index.html";</script>
    <script>window.__CROISSANT_DATA__ = {
  "@context": {
    "@language": "en",
    "@vocab": "https://schema.org/",
    "column": "ml:column",
    "data": {
      "@id": "ml:data",
      "@type": "@json"
    },
    "dataBiases": "ml:dataBiases",
    "dataCollection": "ml:dataCollection",
    "dataType": {
      "@id": "ml:dataType",
      "@type": "@vocab"
    },
    "dct": "http://purl.org/dc/terms/",
    "extract": "ml:extract",
    "field": "ml:field",
    "fileProperty": "ml:fileProperty",
    "format": "ml:format",
    "includes": "ml:includes",
    "isEnumeration": "ml:isEnumeration",
    "jsonPath": "ml:jsonPath",
    "ml": "http://mlcommons.org/schema/",
    "parentField": "ml:parentField",
    "path": "ml:path",
    "personalSensitiveInformation": "ml:personalSensitiveInformation",
    "recordSet": "ml:recordSet",
    "references": "ml:references",
    "regex": "ml:regex",
    "repeated": "ml:repeated",
    "replace": "ml:replace",
    "sc": "https://schema.org/",
    "separator": "ml:separator",
    "source": "ml:source",
    "subField": "ml:subField",
    "transform": "ml:transform"
  },
  "@type": "sc:Dataset",
  "name": "read_from_tar",
  "description": "Example dataset to read several FileSets from a tar.gz and join them.",
  "url": "https://mlcommons.org",
  "distribution": [
    {
      "@type": "sc:FileObject",
      "name": "tar-gz",
      "description": "*.tar.gz containing two folders: training and validation. Each folder contains a list of images (img1.jpg, img2.jpg) with their masks (mask1.jpg, mask2.jpg).",
      "contentUrl": "data/read_from_tar.tar.gz",
      "encodingFormat": "application/x-tar",
      "sha256": "42c1b0638ea739f90254d58f97a2b3f6943de0e60ed0a0f86012a7456e2f555f"
    },
    {
      "@type": "sc:FileSet",
      "name": "source-images",
      "containedIn": "tar-gz",
      "encodingFormat": "image/jpeg",
      "includes": "*/img*.jpg",
      "cr:examples": {
        "file_list": [
          "training/img2.jpg",
          "training/img1.jpg",
          "validation/img2.jpg",
          "validation/img1.jpg"
        ],
        "file_count": 4,
        "includes": [
          "*/img*.jpg"
        ]
      }
    },
    {
      "@type": "sc:FileSet",
      "name": "source-annotations",
      "containedIn": "tar-gz",
      "encodingFormat": "image/jpeg",
      "includes": "*/mask*.jpg",
      "cr:examples": {
        "file_list": [
          "training/mask2.jpg",
          "training/mask1.jpg",
          "validation/mask2.jpg",
          "validation/mask1.jpg"
        ],
        "file_count": 4,
        "includes": [
          "*/mask*.jpg"
        ]
      }
    }
  ],
  "recordSet": [
    {
      "@type": "ml:RecordSet",
      "name": "images",
      "description": "The images.",
      "field": [
        {
          "@type": "ml:Field",
          "name": "id",
          "dataType": "sc:Integer",
          "source": {
            "distribution": "source-images",
            "extract": {
              "fileProperty": "filename"
            },
            "transform": {
              "regex": "^img(\\d).jpg$"
            }
          }
        },
        {
          "@type": "ml:Field",
          "name": "image",
          "dataType": "sc:ImageObject",
          "source": {
            "distribution": "source-images",
            "extract": {
              "fileProperty": "content"
            }
          }
        },
        {
          "@type": "ml:Field",
          "name": "split",
          "dataType": "sc:Text",
          "source": {
            "distribution": "source-images",
            "extract": {
              "fileProperty": "fullpath"
            },
            "transform": {
              "regex": "^(training|validation)\\/.*\\.jpg$"
            }
          }
        }
      ]
    },
    {
      "@type": "ml:RecordSet",
      "name": "annotations",
      "field": [
        {
          "@type": "ml:Field",
          "name": "id",
          "dataType": "sc:Integer",
          "source": {
            "field": "source-annotations",
            "extract": {
              "fileProperty": "filename"
            },
            "transform": {
              "regex": "^mask(\\d).jpg$"
            }
          }
        },
        {
          "@type": "ml:Field",
          "name": "annotation",
          "dataType": "sc:ImageObject",
          "source": {
            "distribution": "source-annotations",
            "extract": {
              "fileProperty": "content"
            }
          }
        }
      ]
    },
    {
      "@type": "ml:RecordSet",
      "name": "images_with_annotations",
      "description": "The images with the mask annotations.",
      "field": [
        {
          "@type": "ml:Field",
          "name": "split",
          "source": {
            "field": "images/split"
          }
        },
        {
          "@type": "ml:Field",
          "name": "id",
          "references": {
            "field": "annotations/id"
          },
          "source": {
            "field": "images/id"
          }
        },
        {
          "@type": "ml:Field",
          "name": "image",
          "source": {
            "field": "images/image"
          }
        },
        {
          "@type": "ml:Field",
          "name": "annotation",
          "source": {
            "field": "annotations/annotation"
          }
        }
      ],
      "cr:examples": {
        "columns": [
          "image",
          "split",
          "id",
          "annotation"
        ],
        "rows": [
          [
            "<PIL.JpegImagePlugin.JpegImageFile image mode=RGB size=3x2 at <MEMORY_ADDRESS>>",
            "training",
            "1",
            "<PIL.JpegImagePlugin.JpegImageFile image mode=RGB size=3x2 at <MEMORY_ADDRESS>>"
          ],
          [
            "<PIL.JpegImagePlugin.JpegImageFile image mode=RGB size=3x2 at <MEMORY_ADDRESS>>",
            "training",
            "1",
            "<PIL.JpegImagePlugin.JpegImageFile image mode=RGB size=3x2 at <MEMORY_ADDRESS>>"
          ],
          [
            "<PIL.JpegImagePlugin.JpegImageFile image mode=RGB size=3x2 at <MEMORY_ADDRESS>>",
            "training",
            "2",
            "<PIL.JpegImagePlugin.JpegImageFile image mode=RGB size=3x2 at <MEMORY_ADDRESS>>"
          ],
          [
            "<PIL.JpegImagePlugin.JpegImageFile image mode=RGB size=3x2 at <MEMORY_ADDRESS>>",
            "training",
            "2",
            "<PIL.JpegImagePlugin.JpegImageFile image mode=RGB size=3x2 at <MEMORY_ADDRESS>>"
          ],
          [
            "<PIL.JpegImagePlugin.JpegImageFile image mode=RGB size=3x2 at <MEMORY_ADDRESS>>",
            "validation",
            "1",
            "<PIL.JpegImagePlugin.JpegImageFile image mode=RGB size=3x2 at <MEMORY_ADDRESS>>"
          ]
        ]
      }
    }
  ]
};</script>
    <script src="../../static/visualizer.min.js"></script>
</body>
</html>
