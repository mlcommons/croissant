<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Croissant Visualizer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <div id="app"><p style="padding:2rem;font-family:sans-serif;color:#6b7280">Loading dataset…</p></div>
    <script>window.__CROISSANT_DATA__ = {

  },

          "*.jpg"
        ]
      }
    }
  ],
  "recordSet": [
    {
      "@type": "ml:RecordSet",
      "name": "images",
      "key": "hash",
      "field": [
        {
          "@type": "ml:Field",
          "name": "hash",
          "description": "The hash of the image, as computed from YFCC-100M.",
          "dataType": "sc:Text",
          "references": {
            "distribution": "metadata",
            "extract": {
              "column": "hash"
            }
          },
          "source": {
            "distribution": "image-files",
            "extract": {
              "fileProperty": "filename"
            },
            "transform": {
              "regex": "([^\\/]*)\\.jpg"
            }
          }
        },
        {
          "@type": "ml:Field",
          "name": "image_content",
          "description": "The content of the image.",
          "dataType": "sc:ImageObject",
          "source": {
            "distribution": "image-files",
            "extract": {
              "fileProperty": "content"
            }
          }
        },
        {
          "@type": "ml:Field",
          "name": "creator_uname",
          "description": "Unique name of photo creator.",
          "dataType": "sc:Text",
          "source": {
            "distribution": "metadata",
            "extract": {
              "column": "unickname"
            }
          }
        },
        {
          "@type": "ml:Field",
          "name": "gps_coordinates",
          "description": "GPS coordinates where the image was taken.",
          "dataType": "sc:GeoCoordinates",
          "subField": [
            {
              "@type": "ml:Field",
              "name": "latitude",
              "dataType": "sc:Float",
              "source": {
                "distribution": "metadata",
                "extract": {
                  "column": "latitude"
                }
              }
            },
            {
              "@type": "ml:Field",
              "name": "longitude",
              "dataType": "sc:Float",
              "source": {
                "distribution": "metadata",
                "extract": {
                  "column": "longitude"
                }
              }
            }
          ]
        },
        {
          "@type": "ml:Field",
          "name": "date_taken",
          "description": "The date the photo was taken.",
          "dataType": "sc:Date",
          "source": {
            "distribution": "metadata",
            "extract": {
              "column": "datetaken"
            },
            "transform": {
              "format": "%Y-%m-%d %H:%M:%S.%f"
            }
          }
        }
      ],
      "cr:examples": {
        "columns": [
          "creator_uname",
          "latitude",
          "longitude",

          "hash",

    }
  ]
};</script>
