<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Croissant Visualizer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <!-- Prism.js for JSON syntax highlighting -->
    <link href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-json.min.js"></script>
    <!-- Marked.js for markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
    <!-- D3.js for SVG graph -->
    <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
    <link rel="stylesheet" href="../../static/visualizer.min.css">
</head>
<body>
    <div id="app"><p style="padding:2rem;font-family:sans-serif;color:#6b7280">Loading dataset…</p></div>
    <script>window.__GALLERY_URL__="../../index.html";</script>
    <script>window.__CROISSANT_DATA__ = {
  "@context": {
    "@language": "en",
    "@vocab": "https://schema.org/",
    "citeAs": "cr:citeAs",
    "column": "cr:column",
    "conformsTo": "dct:conformsTo",
    "cr": "http://mlcommons.org/croissant/",
    "rai": "http://mlcommons.org/croissant/RAI/",
    "data": {
      "@id": "cr:data",
      "@type": "@json"
    },
    "dataType": {
      "@id": "cr:dataType",
      "@type": "@vocab"
    },
    "dct": "http://purl.org/dc/terms/",
    "examples": {
      "@id": "cr:examples",
      "@type": "@json"
    },
    "extract": "cr:extract",
    "field": "cr:field",
    "fileProperty": "cr:fileProperty",
    "fileObject": "cr:fileObject",
    "fileSet": "cr:fileSet",
    "format": "cr:format",
    "includes": "cr:includes",
    "isLiveDataset": "cr:isLiveDataset",
    "jsonPath": "cr:jsonPath",
    "key": "cr:key",
    "md5": "cr:md5",
    "parentField": "cr:parentField",
    "path": "cr:path",
    "recordSet": "cr:recordSet",
    "references": "cr:references",
    "regex": "cr:regex",
    "repeated": "cr:repeated",
    "replace": "cr:replace",
    "sc": "https://schema.org/",
    "separator": "cr:separator",
    "source": "cr:source",
    "subField": "cr:subField",
    "transform": "cr:transform",
    "wd": "https://www.wikidata.org/wiki/"
  },
  "@type": "sc:Dataset",
  "name": "WikiText-103",
  "description": "The WikiText language modeling dataset is a collection of over 100 million tokens extracted from the set of verified Good and Featured articles on Wikipedia. The dataset is available under the Creative Commons Attribution-ShareAlike License.\n\nCompared to the preprocessed version of Penn Treebank (PTB), WikiText-2 is over 2 times larger and WikiText-103 is over 110 times larger. The WikiText dataset also features a far larger vocabulary and retains the original case, punctuation and numbers - all of which are removed in PTB. As it is composed of full articles, the dataset is well suited for models that can take advantage of long term dependencies.",
  "conformsTo": "http://mlcommons.org/croissant/1.0",
  "citeAs": "@article{merity2016pointer, title={Pointer sentinel mixture models}, author={Merity, Stephen and Xiong, Caiming and Bradbury, James and Socher, Richard}, journal={arXiv preprint arXiv:1609.07843}, year={2016} }",
  "license": "cc-by-sa-3.0",
  "url": "https://blog.salesforceairesearch.com/the-wikitext-long-term-dependency-language-modeling-dataset/",
  "distribution": [
    {
      "@type": "cr:FileObject",
      "@id": "wikitext-103-v1.zip",
      "name": "wikitext-103-v1.zip",
      "contentUrl": "https://s3.amazonaws.com/research.metamind.io/wikitext/wikitext-103-v1.zip",
      "encodingFormat": "application/zip",
      "sha256": "242ba0f20b329cfdf1ccc61e9e9e5b59becf189db7f7a81cd2a0e2fc31539590"
    },
    {
      "@type": "cr:FileSet",
      "@id": "token-files",
      "name": "token-files",
      "containedIn": {
        "@id": "wikitext-103-v1.zip"
      },
      "encodingFormat": "image/jpeg",
      "includes": "wikitext-103/*.tokens",
      "cr:examples": {
        "file_list": [],
        "file_count": 0,
        "includes": [
          "wikitext-103/*.tokens"
        ]
      }
    },
    {
      "@type": "cr:FileObject",
      "@id": "splits.csv",
      "name": "splits.csv",
      "contentUrl": "data/splits.csv",
      "encodingFormat": "text/csv",
      "sha256": "dec55b82438aba979670b0eabd99b1d8cc9d385cef028314feccba1cc68af33b",
      "cr:examples": {
        "text_preview": "name,url\ntrain,https://mlcommons.org/definitions/training_split\nvalid,https://mlcommons.org/definitions/validation_split\ntest,https://mlcommons.org/definitions/test_split"
      }
    }
  ],
  "recordSet": [
    {
      "@type": "cr:RecordSet",
      "@id": "split_enums",
      "name": "split_enums",
      "description": "Maps split names to semantic values.",
      "key": {
        "@id": "name"
      },
      "field": [
        {
          "@type": "cr:Field",
          "@id": "split_enums/name",
          "name": "split_enums/name",
          "description": "One of: train, valid, test.",
          "dataType": "sc:Text",
          "source": {
            "fileObject": {
              "@id": "splits.csv"
            },
            "extract": {
              "column": "name"
            }
          }
        },
        {
          "@type": "cr:Field",
          "@id": "split_enums/url",
          "name": "split_enums/url",
          "description": "Corresponding mlcommons.org definition URL",
          "dataType": [
            "sc:URL",
            "wd:Q3985153"
          ],
          "source": {
            "fileObject": {
              "@id": "splits.csv"
            },
            "extract": {
              "column": "url"
            }
          }
        }
      ]
    },
    {
      "@type": "cr:RecordSet",
      "@id": "words",
      "name": "words",
      "description": "The words of the token files, including their split.",
      "field": [
        {
          "@type": "cr:Field",
          "@id": "words/word",
          "name": "words/word",
          "description": "A word.",
          "dataType": "sc:Text",
          "repeated": true,
          "source": {
            "fileSet": {
              "@id": "token-files"
            },
            "extract": {
              "fileProperty": "content"
            },
            "transform": [
              {
                "replace": "\\n/<eos>"
              },
              {
                "separator": " "
              }
            ]
          }
        },
        {
          "@type": "cr:Field",
          "@id": "words/split",
          "name": "words/split",
          "description": "The train, valid or test split.",
          "dataType": [
            "sc:Text",
            "wd:Q3985153"
          ],
          "references": {
            "field": {
              "@id": "split_enums/name"
            }
          },
          "source": {
            "fileSet": {
              "@id": "token-files"
            },
            "extract": {
              "fileProperty": "fullpath"
            },
            "transform": {
              "regex": "^wiki\\.(train|valid|test)\\.tokens$"
            }
          }
        }
      ]
    }
  ]
};</script>
    <script src="../../static/visualizer.min.js"></script>
</body>
</html>
