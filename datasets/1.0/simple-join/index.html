<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Croissant Visualizer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <!-- Prism.js for JSON syntax highlighting -->
    <link href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-json.min.js"></script>
    <!-- Marked.js for markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
    <!-- D3.js for SVG graph -->
    <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
    <link rel="stylesheet" href="../../static/visualizer.min.css">
</head>
<body>
    <div id="app"><p style="padding:2rem;font-family:sans-serif;color:#6b7280">Loading dataset…</p></div>
    <script>window.__CROISSANT_DATA__ = {
  "@context": {
    "@language": "en",
    "@vocab": "https://schema.org/",
    "citeAs": "cr:citeAs",
    "column": "cr:column",
    "conformsTo": "dct:conformsTo",
    "cr": "http://mlcommons.org/croissant/",
    "rai": "http://mlcommons.org/croissant/RAI/",
    "data": {
      "@id": "cr:data",
      "@type": "@json"
    },
    "dataType": {
      "@id": "cr:dataType",
      "@type": "@vocab"
    },
    "dct": "http://purl.org/dc/terms/",
    "examples": {
      "@id": "cr:examples",
      "@type": "@json"
    },
    "extract": "cr:extract",
    "field": "cr:field",
    "fileProperty": "cr:fileProperty",
    "fileObject": "cr:fileObject",
    "fileSet": "cr:fileSet",
    "format": "cr:format",
    "includes": "cr:includes",
    "isLiveDataset": "cr:isLiveDataset",
    "jsonPath": "cr:jsonPath",
    "key": "cr:key",
    "md5": "cr:md5",
    "parentField": "cr:parentField",
    "path": "cr:path",
    "recordSet": "cr:recordSet",
    "references": "cr:references",
    "regex": "cr:regex",
    "repeated": "cr:repeated",
    "replace": "cr:replace",
    "sc": "https://schema.org/",
    "separator": "cr:separator",
    "source": "cr:source",
    "subField": "cr:subField",
    "transform": "cr:transform"
  },
  "@type": "sc:Dataset",
  "name": "simple-join",
  "description": "Example to showcase the use of join.",
  "conformsTo": "http://mlcommons.org/croissant/1.0",
  "license": "https://creativecommons.org/licenses/by/4.0/",
  "url": "https://mlcommons.org",
  "distribution": [
    {
      "@type": "cr:FileObject",
      "@id": "publications",
      "name": "publications",
      "contentUrl": "data/publications.csv",
      "encodingFormat": "text/csv",
      "sha256": "d1bd4b903d5de29e6d455f28a68aff7095d3393a19a7cdfdeea3b9ad799e1ce1",
      "cr:examples": {
        "text_preview": "title,by\nA New Approach to Machine Learning Using Neural Networks,john.smith@gmail.com\nThe Application of Machine Learning to Natural Language Processing,jane.doe@yahoo.com\nThe Use of Machine Learning to Predict the Stock Market,david.lee@outlook.com\n"
      }
    }
  ],
  "recordSet": [
    {
      "@type": "cr:RecordSet",
      "@id": "users",
      "name": "users",
      "description": "List of users.",
      "field": [
        {
          "@type": "cr:Field",
          "@id": "users/email",
          "name": "users/email",
          "description": "Email of the author.",
          "dataType": "sc:Text"
        },
        {
          "@type": "cr:Field",
          "@id": "users/fullname",
          "name": "users/fullname",
          "description": "Full name of the author.",
          "dataType": "sc:Text"
        }
      ],
      "data": [
        {
          "users/email": "john.smith@gmail.com",
          "users/fullname": "John Smith"
        },
        {
          "users/email": "jane.doe@yahoo.com",
          "users/fullname": "Jane Doe"
        },
        {
          "users/email": "david.lee@outlook.com",
          "users/fullname": "David Lee"
        },
        {
          "users/email": "mary.jones@hotmail.com",
          "users/fullname": "Mary Jones"
        }
      ],
      "cr:examples": {
        "columns": [
          "email",
          "fullname"
        ],
        "rows": [
          [
            "john.smith@gmail.com",
            "John Smith"
          ],
          [
            "jane.doe@yahoo.com",
            "Jane Doe"
          ],
          [
            "david.lee@outlook.com",
            "David Lee"
          ],
          [
            "mary.jones@hotmail.com",
            "Mary Jones"
          ]
        ]
      }
    },
    {
      "@type": "cr:RecordSet",
      "@id": "publications_by_user",
      "name": "publications_by_user",
      "description": "List of publications by user.",
      "field": [
        {
          "@type": "cr:Field",
          "@id": "publications_by_user/title",
          "name": "publications_by_user/title",
          "description": "Full title of the publication.",
          "dataType": "sc:Text",
          "source": {
            "fileObject": {
              "@id": "publications"
            },
            "extract": {
              "column": "title"
            }
          }
        },
        {
          "@type": "cr:Field",
          "@id": "publications_by_user/author_email",
          "name": "publications_by_user/author_email",
          "description": "Email of the author.",
          "dataType": "sc:Text",
          "references": {
            "field": {
              "@id": "users/email"
            }
          },
          "source": {
            "fileObject": {
              "@id": "publications"
            },
            "extract": {
              "column": "by"
            }
          }
        },
        {
          "@type": "cr:Field",
          "@id": "publications_by_user/author_fullname",
          "name": "publications_by_user/author_fullname",
          "description": "Full name of the author.",
          "dataType": "sc:Text",
          "source": {
            "field": {
              "@id": "users/fullname"
            }
          }
        }
      ],
      "cr:examples": {
        "columns": [
          "title",
          "author_email",
          "author_fullname"
        ],
        "rows": [
          [
            "A New Approach to Machine Learning Using Neural Networks",
            "john.smith@gmail.com",
            "John Smith"
          ],
          [
            "The Application of Machine Learning to Natural Language Processing",
            "jane.doe@yahoo.com",
            "Jane Doe"
          ],
          [
            "The Use of Machine Learning to Predict the Stock Market",
            "david.lee@outlook.com",
            "David Lee"
          ]
        ]
      }
    }
  ]
};</script>
    <script src="../../static/visualizer.min.js"></script>
</body>
</html>
