<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Croissant Visualizer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <!-- Prism.js for JSON syntax highlighting -->
    <link href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-json.min.js"></script>
    <!-- Marked.js for markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
    <!-- D3.js for SVG graph -->
    <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
    <link rel="stylesheet" href="../../static/visualizer.min.css">
</head>
<body>
    <div id="app"><p style="padding:2rem;font-family:sans-serif;color:#6b7280">Loading dataset…</p></div>
    <script>window.__GALLERY_URL__="../../index.html";</script>
    <script>window.__CROISSANT_DATA__ = {
  "@context": {
    "@language": "en",
    "@vocab": "https://schema.org/",
    "citeAs": "cr:citeAs",
    "column": "cr:column",
    "conformsTo": "dct:conformsTo",
    "cr": "http://mlcommons.org/croissant/",
    "rai": "http://mlcommons.org/croissant/RAI/",
    "data": {
      "@id": "cr:data",
      "@type": "@json"
    },
    "dataType": {
      "@id": "cr:dataType",
      "@type": "@vocab"
    },
    "dct": "http://purl.org/dc/terms/",
    "examples": {
      "@id": "cr:examples",
      "@type": "@json"
    },
    "extract": "cr:extract",
    "field": "cr:field",
    "fileProperty": "cr:fileProperty",
    "fileObject": "cr:fileObject",
    "fileSet": "cr:fileSet",
    "format": "cr:format",
    "includes": "cr:includes",
    "isLiveDataset": "cr:isLiveDataset",
    "jsonPath": "cr:jsonPath",
    "key": "cr:key",
    "md5": "cr:md5",
    "parentField": "cr:parentField",
    "path": "cr:path",
    "recordSet": "cr:recordSet",
    "references": "cr:references",
    "regex": "cr:regex",
    "repeated": "cr:repeated",
    "replace": "cr:replace",
    "sc": "https://schema.org/",
    "separator": "cr:separator",
    "source": "cr:source",
    "subField": "cr:subField",
    "transform": "cr:transform"
  },
  "@type": "sc:Dataset",
  "name": "file_object_in_zip",
  "description": "Minimal example to read a FileObject contained in a zip.",
  "conformsTo": "http://mlcommons.org/croissant/1.0",
  "url": "https://mlcommons.org",
  "distribution": [
    {
      "@type": "cr:FileObject",
      "@id": "zip_with_csv",
      "name": "zip_with_csv",
      "contentUrl": "data/zip_with_csv.zip",
      "encodingFormat": "application/zip",
      "sha256": "409b80b15f540661197ae22b78cda2f5cd71f336379f5c9cd1a6b4fc6abe74bd",
      "cr:examples": {
        "file_list": [
          "csv_in_zip.csv",
          "csv1_in_zip.csv",
          "csv2_in_zip.csv"
        ],
        "file_count": 3
      }
    },
    {
      "@type": "cr:FileObject",
      "@id": "csv2_in_zip",
      "name": "csv2_in_zip",
      "containedIn": {
        "@id": "zip_with_csv"
      },
      "contentUrl": "csv2_in_zip.csv",
      "encodingFormat": "text/csv"
    },
    {
      "@type": "cr:FileObject",
      "@id": "csv1_in_zip",
      "name": "csv1_in_zip",
      "containedIn": {
        "@id": "zip_with_csv"
      },
      "contentUrl": "csv1_in_zip.csv",
      "encodingFormat": "text/csv"
    }
  ],
  "recordSet": [
    {
      "@type": "cr:RecordSet",
      "@id": "csv1",
      "name": "csv1",
      "description": "Records extracted from the CSV in the ZIP.",
      "field": [
        {
          "@type": "cr:Field",
          "@id": "csv1/property1",
          "name": "csv1/property1",
          "dataType": "sc:Text",
          "source": {
            "fileObject": {
              "@id": "csv1_in_zip"
            },
            "extract": {
              "column": "property1"
            }
          }
        }
      ],
      "cr:examples": {
        "columns": [
          "property1"
        ],
        "rows": [
          [
            "foo1"
          ],
          [
            "bar1"
          ]
        ]
      }
    },
    {
      "@type": "cr:RecordSet",
      "@id": "csv2",
      "name": "csv2",
      "description": "Records extracted from the CSV in the ZIP.",
      "field": [
        {
          "@type": "cr:Field",
          "@id": "csv2/property2",
          "name": "csv2/property2",
          "dataType": "sc:Text",
          "source": {
            "fileObject": {
              "@id": "csv2_in_zip"
            },
            "extract": {
              "column": "property2"
            }
          }
        }
      ],
      "cr:examples": {
        "columns": [
          "property2"
        ],
        "rows": [
          [
            "foo2"
          ],
          [
            "bar2"
          ]
        ]
      }
    }
  ]
};</script>
    <script src="../../static/visualizer.min.js"></script>
</body>
</html>
