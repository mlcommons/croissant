<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Croissant Visualizer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <!-- Prism.js for JSON syntax highlighting -->
    <link href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-json.min.js"></script>
    <!-- Marked.js for markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
    <!-- D3.js for SVG graph -->
    <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
    <link rel="stylesheet" href="../../static/visualizer.min.css">
</head>
<body>
    <div id="app"><p style="padding:2rem;font-family:sans-serif;color:#6b7280">Loading dataset…</p></div>
    <script>window.__GALLERY_URL__="../../index.html";</script>
    <script>window.__CROISSANT_DATA__ = {
  "@context": {
    "@language": "en",
    "@vocab": "https://schema.org/",
    "citeAs": "cr:citeAs",
    "column": "cr:column",
    "conformsTo": "dct:conformsTo",
    "cr": "http://mlcommons.org/croissant/",
    "rai": "http://mlcommons.org/croissant/RAI/",
    "data": {
      "@id": "cr:data",
      "@type": "@json"
    },
    "dataType": {
      "@id": "cr:dataType",
      "@type": "@vocab"
    },
    "dct": "http://purl.org/dc/terms/",
    "examples": {
      "@id": "cr:examples",
      "@type": "@json"
    },
    "extract": "cr:extract",
    "field": "cr:field",
    "fileProperty": "cr:fileProperty",
    "fileObject": "cr:fileObject",
    "fileSet": "cr:fileSet",
    "format": "cr:format",
    "includes": "cr:includes",
    "isLiveDataset": "cr:isLiveDataset",
    "jsonPath": "cr:jsonPath",
    "key": "cr:key",
    "md5": "cr:md5",
    "parentField": "cr:parentField",
    "path": "cr:path",
    "recordSet": "cr:recordSet",
    "references": "cr:references",
    "regex": "cr:regex",
    "repeated": "cr:repeated",
    "replace": "cr:replace",
    "sc": "https://schema.org/",
    "separator": "cr:separator",
    "source": "cr:source",
    "subField": "cr:subField",
    "transform": "cr:transform"
  },
  "@type": "sc:Dataset",
  "name": "read_from_tar",
  "description": "Example dataset to read several FileSets from a tar.gz and join them.",
  "conformsTo": "http://mlcommons.org/croissant/1.0",
  "url": "https://mlcommons.org",
  "distribution": [
    {
      "@type": "cr:FileObject",
      "@id": "tar-gz",
      "name": "tar-gz",
      "description": "*.tar.gz containing two folders: training and validation. Each folder contains a list of images (img1.jpg, img2.jpg) with their masks (mask1.jpg, mask2.jpg).",
      "contentUrl": "data/read_from_tar.tar.gz",
      "encodingFormat": "application/x-tar",
      "sha256": "42c1b0638ea739f90254d58f97a2b3f6943de0e60ed0a0f86012a7456e2f555f"
    },
    {
      "@type": "cr:FileSet",
      "@id": "source-images",
      "name": "source-images",
      "containedIn": {
        "@id": "tar-gz"
      },
      "encodingFormat": "image/jpeg",
      "includes": "*/img*.jpg",
      "cr:examples": {
        "file_list": [
          "training/img2.jpg",
          "training/img1.jpg",
          "validation/img2.jpg",
          "validation/img1.jpg"
        ],
        "file_count": 4,
        "includes": [
          "*/img*.jpg"
        ]
      }
    },
    {
      "@type": "cr:FileSet",
      "@id": "source-annotations",
      "name": "source-annotations",
      "containedIn": {
        "@id": "tar-gz"
      },
      "encodingFormat": "image/jpeg",
      "includes": "*/mask*.jpg",
      "cr:examples": {
        "file_list": [
          "training/mask2.jpg",
          "training/mask1.jpg",
          "validation/mask2.jpg",
          "validation/mask1.jpg"
        ],
        "file_count": 4,
        "includes": [
          "*/mask*.jpg"
        ]
      }
    }
  ],
  "recordSet": [
    {
      "@type": "cr:RecordSet",
      "@id": "images",
      "name": "images",
      "description": "The images.",
      "field": [
        {
          "@type": "cr:Field",
          "@id": "images/id",
          "name": "images/id",
          "dataType": "sc:Integer",
          "source": {
            "fileSet": {
              "@id": "source-images"
            },
            "extract": {
              "fileProperty": "filename"
            },
            "transform": {
              "regex": "^img(\\d).jpg$"
            }
          }
        },
        {
          "@type": "cr:Field",
          "@id": "images/image",
          "name": "images/image",
          "dataType": "sc:ImageObject",
          "source": {
            "fileSet": {
              "@id": "source-images"
            },
            "extract": {
              "fileProperty": "content"
            }
          }
        },
        {
          "@type": "cr:Field",
          "@id": "images/split",
          "name": "images/split",
          "dataType": "sc:Text",
          "source": {
            "fileSet": {
              "@id": "source-images"
            },
            "extract": {
              "fileProperty": "fullpath"
            },
            "transform": {
              "regex": "^(training|validation)\\/.*\\.jpg$"
            }
          }
        }
      ]
    },
    {
      "@type": "cr:RecordSet",
      "@id": "annotations",
      "name": "annotations",
      "field": [
        {
          "@type": "cr:Field",
          "@id": "annotations/id",
          "name": "annotations/id",
          "dataType": "sc:Integer",
          "source": {
            "field": {
              "@id": "source-annotations"
            },
            "extract": {
              "fileProperty": "filename"
            },
            "transform": {
              "regex": "^mask(\\d).jpg$"
            }
          }
        },
        {
          "@type": "cr:Field",
          "@id": "annotations/annotation",
          "name": "annotations/annotation",
          "dataType": "sc:ImageObject",
          "source": {
            "fileSet": {
              "@id": "source-annotations"
            },
            "extract": {
              "fileProperty": "content"
            }
          }
        }
      ]
    },
    {
      "@type": "cr:RecordSet",
      "@id": "images_with_annotations",
      "name": "images_with_annotations",
      "description": "The images with the mask annotations.",
      "field": [
        {
          "@type": "cr:Field",
          "@id": "images_with_annotations/split",
          "name": "images_with_annotations/split",
          "source": {
            "field": {
              "@id": "images/split"
            }
          }
        },
        {
          "@type": "cr:Field",
          "@id": "images_with_annotations/id",
          "name": "images_with_annotations/id",
          "references": {
            "field": {
              "@id": "annotations/id"
            }
          },
          "source": {
            "field": {
              "@id": "images/id"
            }
          }
        },
        {
          "@type": "cr:Field",
          "@id": "images_with_annotations/image",
          "name": "images_with_annotations/image",
          "source": {
            "field": {
              "@id": "images/image"
            }
          }
        },
        {
          "@type": "cr:Field",
          "@id": "images_with_annotations/annotation",
          "name": "images_with_annotations/annotation",
          "source": {
            "field": {
              "@id": "annotations/annotation"
            }
          }
        }
      ],
      "cr:examples": {
        "columns": [
          "image",
          "split",
          "id",
          "annotation"
        ],
        "rows": [
          [
            "<PIL.JpegImagePlugin.JpegImageFile image mode=RGB size=3x2 at <MEMORY_ADDRESS>>",
            "training",
            "1",
            "<PIL.JpegImagePlugin.JpegImageFile image mode=RGB size=3x2 at <MEMORY_ADDRESS>>"
          ],
          [
            "<PIL.JpegImagePlugin.JpegImageFile image mode=RGB size=3x2 at <MEMORY_ADDRESS>>",
            "training",
            "1",
            "<PIL.JpegImagePlugin.JpegImageFile image mode=RGB size=3x2 at <MEMORY_ADDRESS>>"
          ],
          [
            "<PIL.JpegImagePlugin.JpegImageFile image mode=RGB size=3x2 at <MEMORY_ADDRESS>>",
            "training",
            "2",
            "<PIL.JpegImagePlugin.JpegImageFile image mode=RGB size=3x2 at <MEMORY_ADDRESS>>"
          ],
          [
            "<PIL.JpegImagePlugin.JpegImageFile image mode=RGB size=3x2 at <MEMORY_ADDRESS>>",
            "training",
            "2",
            "<PIL.JpegImagePlugin.JpegImageFile image mode=RGB size=3x2 at <MEMORY_ADDRESS>>"
          ],
          [
            "<PIL.JpegImagePlugin.JpegImageFile image mode=RGB size=3x2 at <MEMORY_ADDRESS>>",
            "validation",
            "1",
            "<PIL.JpegImagePlugin.JpegImageFile image mode=RGB size=3x2 at <MEMORY_ADDRESS>>"
          ]
        ]
      }
    }
  ]
};</script>
    <script src="../../static/visualizer.min.js"></script>
</body>
</html>
